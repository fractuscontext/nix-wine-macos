name: Build Wine on amd64 Darwin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15-intel
    outputs:
      wine_tag: ${{ steps.wine_version.outputs.tag }}
      wine_tarball: ${{ steps.wine_version.outputs.tarball }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Restore ccache
        uses: actions/cache/restore@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Extract Package
        run: nix develop --command extract-wine

      - name: Extract Wine Version
        id: wine_version
        run: |
          VERSION=$(cat sources/wine/VERSION 2>/dev/null \
            | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' \
            | head -1)

          if grep -q "Crossover hacks" sources/wine/configure.ac 2>/dev/null; then
            FLAVOUR="cx-wine"
          else
            FLAVOUR="vanilla-wine"
          fi

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${FLAVOUR}-${VERSION}-${SHORT_SHA}"
          TARBALL="wine-${TAG}.tar.xz"

          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "flavour=$FLAVOUR"   >> $GITHUB_OUTPUT
          echo "tag=$TAG"           >> $GITHUB_OUTPUT
          echo "tarball=$TARBALL"   >> $GITHUB_OUTPUT

          echo "Detected: $TAG"

      - name: Configure Wine
        run: nix develop ".#default" --system x86_64-darwin --command "configure-wow64"

      - name: Compile Wine
        run: nix develop ".#default" --system x86_64-darwin --command "compile-wow64"

      - name: Install Wine
        run: nix develop ".#default" --system x86_64-darwin --command "install-wow64"

      - name: Bundle Dependencies
        run: nix develop ".#default" --system x86_64-darwin --command "bundle-wow64"

      - name: Save ccache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Wine Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: wine-${{ steps.wine_version.outputs.tag }}-${{ github.run_id }}
          path: output/
          retention-days: 7

  release:
    needs: build
    if: |
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:

      - name: Download Build Artifact Zip
        uses: actions/download-artifact@v8
        with:
          name: wine-${{ needs.build.outputs.wine_tag }}-${{ github.run_id }}
          path: output/
          skip-decompress: true

      - name: Rename and Prepare Zip
        run: |
          mv output/wine-${{ needs.build.outputs.wine_tag }}-${{ github.run_id }}.zip wine-${{ needs.build.outputs.wine_tag }}.zip
          echo "Zip size: $(du -sh wine-${{ needs.build.outputs.wine_tag }}.zip | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.wine_tag }}
          name: ${{ needs.build.outputs.wine_tag }}
          files: wine-${{ needs.build.outputs.wine_tag }}.zip
          generate_release_notes: true
          make_latest: true
